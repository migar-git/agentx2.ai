# Dependabot — keep the build toolchain and GitHub Actions current so the CI
# dependency-audit gate (`npm run audit:prod`) has the smallest possible exposure window.
# Grouped to minimize PR noise. Docs: docs/reviews/security-review.md · docs/plans/master-build-plan.md
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
      include: scope
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
